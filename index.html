<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milkshake Ultimate</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #e9dfd4;
    }

    header {
      background: #e6634a;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #fff;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    .btn {
      background: #e6634a;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    img {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>🥤 Milkshake Ultimate</header>

<div class="container">

  <!-- CAMERA -->
  <div class="card">
    <h3>📸 Зураг авах</h3>

    <input type="file" accept="image/*" capture="environment" id="cameraInput">

    <img id="preview">
  </div>

  <!-- CALORIE -->
  <div class="card">
    <h3>🔥 Calories тооцох</h3>

    <select id="type">
      <option value="450">🍫 Chocolate</option>
      <option value="300">🍓 Strawberry</option>
      <option value="320">🍌 Banana</option>
      <option value="280">🫐 Berry</option>
      <option value="310">🥭 Mango</option>
    </select>

    <button class="btn" onclick="calc()">Тооцох</button>

    <p id="result"></p>
  </div>

</div>

<script>
  // CAMERA
  const input = document.getElementById('cameraInput');
  const preview = document.getElementById('preview');

  input.addEventListener('change', function () {
    const file = input.files[0];
    if (file) {
      preview.src = URL.createObjectURL(file);
    }
  });

  // CALORIES
  function calc() {
    const kcal = document.getElementById("type").value;
    document.getElementById("result").innerText =
      "🔥 " + kcal + " kcal";
  }
</script>

</body>
</html>
