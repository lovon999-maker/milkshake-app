<!DOCTYPE html>

.kcal {

<body>

<div class="header">🥤 Milkshake Жор</div>

<div class="card">
<div class="title">🍓 Гүзээлзгэний Milkshake</div>

</div>

<div class="card">
<div class="title">🍌 Банантай Milkshake</div>

<div class="card">

</html>
